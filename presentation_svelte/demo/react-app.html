<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Tracker — React</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:system-ui,sans-serif; background:#0a0a1a; color:#f0f0f5; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:30px 20px; }
    .badge { display:inline-block; padding:4px 14px; border-radius:20px; font-size:11px; font-weight:700; background:rgba(97,218,251,.15); color:#61dafb; margin-bottom:16px; letter-spacing:1px; }
    h1 { font-size:28px; font-weight:800; margin-bottom:6px; }
    h1 span { color:#61dafb; }
    .subtitle { color:#a0a0c0; font-size:14px; margin-bottom:24px; }
    .app { width:100%; max-width:480px; }
    .stats { display:flex; gap:12px; margin-bottom:20px; }
    .stat { flex:1; padding:14px; border-radius:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); text-align:center; }
    .stat-num { font-size:24px; font-weight:800; color:#61dafb; }
    .stat-lbl { font-size:10px; color:#a0a0c0; margin-top:2px; }
    .filters { display:flex; gap:6px; margin-bottom:16px; }
    .filter-btn { padding:6px 14px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:transparent; color:#a0a0c0; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; }
    .filter-btn.active { border-color:#61dafb; color:#61dafb; background:rgba(97,218,251,.1); }
    .input-row { display:flex; gap:8px; margin-bottom:16px; }
    .input-row input { flex:1; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:#f0f0f5; font-size:13px; outline:none; }
    .input-row input:focus { border-color:#61dafb; }
    .input-row select { padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:#f0f0f5; font-size:13px; outline:none; }
    .add-btn { padding:10px 18px; border-radius:10px; border:none; background:#61dafb; color:#0a0a1a; font-weight:700; cursor:pointer; font-size:13px; }
    .list { list-style:none; }
    .player { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:10px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.05); margin-bottom:8px; transition:all .3s; }
    .player:hover { background:rgba(255,255,255,.06); }
    .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .dot.rival { background:#ff5252; }
    .dot.explorateur { background:#69f0ae; }
    .dot.objet { background:#ff9800; }
    .name { flex:1; font-size:14px; font-weight:600; }
    .role-tag { font-size:10px; padding:2px 8px; border-radius:6px; font-weight:600; }
    .role-tag.rival { background:rgba(255,82,82,.15); color:#ff5252; }
    .role-tag.explorateur { background:rgba(105,240,174,.15); color:#69f0ae; }
    .role-tag.objet { background:rgba(255,152,0,.15); color:#ff9800; }
    .ttl { font-family:monospace; font-size:12px; color:#a0a0c0; }
    .ttl.urgent { color:#ff5252; }
    .del-btn { width:28px; height:28px; border-radius:6px; border:none; background:transparent; color:#a0a0c0; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .del-btn:hover { background:rgba(255,82,82,.15); color:#ff5252; }
    .footer { margin-top:16px; padding-top:12px; border-top:1px solid rgba(255,255,255,.08); font-size:11px; color:#a0a0c0; display:flex; justify-content:space-between; }
    .line-count { margin-top:20px; padding:10px 16px; border-radius:10px; background:rgba(97,218,251,.08); border:1px solid rgba(97,218,251,.2); text-align:center; font-size:12px; color:#61dafb; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .player { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body>
  <div class="badge">REACT 18</div>
  <h1>Mission <span>Tracker</span></h1>
  <p class="subtitle">Suivi des ressources en temps réel</p>
  <div id="root" class="app"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    // ══════════════════════════════════════════════
    // React : 85 lignes de logique
    // ══════════════════════════════════════════════

    function App() {
      const [resources, setResources] = useState([
        { id: 1, name: "Alice", role: "rival", ttl: null, score: 3 },
        { id: 2, name: "Bob", role: "explorateur", ttl: null, score: 1 },
        { id: 3, name: "Coffre", role: "objet", ttl: 45, score: null },
        { id: 4, name: "Potion", role: "objet", ttl: 20, score: null },
      ]);
      const [filter, setFilter] = useState("all");
      const [newName, setNewName] = useState("");
      const [newRole, setNewRole] = useState("rival");
      let nextId = 5;

      // Computed values — besoin de useMemo + dépendances
      const players = useMemo(
        () => resources.filter(r => r.role !== "objet"),
        [resources]
      );
      const objects = useMemo(
        () => resources.filter(r => r.role === "objet"),
        [resources]
      );
      const filtered = useMemo(
        () => filter === "all" ? resources : resources.filter(r => r.role === filter),
        [resources, filter]
      );
      const avgTTL = useMemo(
        () => {
          const withTTL = objects.filter(o => o.ttl > 0);
          return withTTL.length ? Math.round(withTTL.reduce((s, o) => s + o.ttl, 0) / withTTL.length) : 0;
        },
        [objects]
      );

      // TTL countdown — useEffect + cleanup
      useEffect(() => {
        const interval = setInterval(() => {
          setResources(prev =>
            prev.map(r =>
              r.role === "objet" && r.ttl > 0
                ? { ...r, ttl: r.ttl - 1 }
                : r
            )
          );
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      // Handlers
      const addResource = useCallback(() => {
        if (!newName.trim()) return;
        setResources(prev => [...prev, {
          id: nextId++,
          name: newName,
          role: newRole,
          ttl: newRole === "objet" ? 60 : null,
          score: newRole !== "objet" ? 0 : null,
        }]);
        setNewName("");
      }, [newName, newRole]);

      const removeResource = useCallback((id) => {
        setResources(prev => prev.filter(r => r.id !== id));
      }, []);

      return (
        <>
          <div className="stats">
            <div className="stat">
              <div className="stat-num">{players.length}</div>
              <div className="stat-lbl">Joueurs</div>
            </div>
            <div className="stat">
              <div className="stat-num">{objects.length}</div>
              <div className="stat-lbl">Objets</div>
            </div>
            <div className="stat">
              <div className="stat-num">{avgTTL}s</div>
              <div className="stat-lbl">TTL moyen</div>
            </div>
          </div>

          <div className="filters">
            {["all", "rival", "explorateur", "objet"].map(f => (
              <button key={f} className={`filter-btn ${filter === f ? "active" : ""}`}
                onClick={() => setFilter(f)}>
                {f === "all" ? "Tous" : f}
              </button>
            ))}
          </div>

          <div className="input-row">
            <input value={newName}
              onChange={e => setNewName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addResource()}
              placeholder="Nom..." />
            <select value={newRole} onChange={e => setNewRole(e.target.value)}>
              <option value="rival">Rival</option>
              <option value="explorateur">Explorateur</option>
              <option value="objet">Objet</option>
            </select>
            <button className="add-btn" onClick={addResource}>+</button>
          </div>

          <ul className="list">
            {filtered.map(r => (
              <li key={r.id} className="player">
                <span className={`dot ${r.role}`}></span>
                <span className="name">{r.name}</span>
                <span className={`role-tag ${r.role}`}>{r.role}</span>
                {r.ttl !== null && (
                  <span className={`ttl ${r.ttl < 10 ? "urgent" : ""}`}>{r.ttl}s</span>
                )}
                {r.score !== null && (
                  <span className="ttl">Score: {r.score}</span>
                )}
                <button className="del-btn" onClick={() => removeResource(r.id)}>x</button>
              </li>
            ))}
          </ul>

          <div className="footer">
            <span>{filtered.length} ressource{filtered.length !== 1 ? "s" : ""}</span>
            <span>{resources.length} total</span>
          </div>

          <div className="line-count">
            React : ~85 lignes de logique | useState x4 | useMemo x4 | useEffect x1 | useCallback x2
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
